<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>عائلة الحجاج</title>
  <link href="https://fonts.googleapis.com/css2?family=El+Messiri:wght@600;700&family=IBM+Plex+Sans+Arabic:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root{
      --olive: #4A6741;
      --gold: #C9A45A;
      --cream: #FAF7F2;
      --dark: #2C1810;
      --muted: #7A6E64;
      --card: #fff;
      --line: rgba(74, 103, 65, 0.15);
      --disabled: #e3e3e3;
      --disabled-text: #8a8a8a;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: 'IBM Plex Sans Arabic', -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", sans-serif;
      background: var(--cream);
      color: var(--dark);
    }

    .wrap {
      max-width: 420px;
      margin: 0 auto;
      padding: 40px 20px 28px;
      text-align: center;
    }

    h1 {
      margin: 0 0 10px;
      font-family: 'El Messiri', serif;
      font-size: 34px;
      font-weight: 700;
      line-height: 1.2;
      color: var(--olive);
    }

    .sub {
      margin: 0 0 28px;
      color: var(--muted);
      font-size: 18px;
    }

    .tree-card {
      display: block;
      text-decoration: none;
      color: inherit;
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 24px;
      padding: 26px 20px;
      margin-bottom: 18px;
    }

    .tree-icon {
      width: 72px;
      height: 72px;
      margin: 0 auto 14px;
      border-radius: 20px;
      background: rgba(74, 103, 65, 0.12);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 34px;
      color: var(--olive);
    }

    .tree-title {
      font-family: 'El Messiri', serif;
      font-size: 26px;
      font-weight: 700;
      margin-bottom: 6px;
      color: var(--olive);
    }

    .tree-desc {
      font-size: 16px;
      color: var(--muted);
    }

    .btn {
      width: 100%;
      border: 0;
      border-radius: 18px;
      padding: 18px 16px;
      background: var(--disabled);
      color: var(--disabled-text);
      font-size: 18px;
      font-weight: 700;
      margin-top: 12px;
      cursor: not-allowed;
    }

    .soon {
      display: block;
      margin-top: 4px;
      font-size: 13px;
      font-weight: 500;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>عائلة الحجاج</h1>
    <p class="sub">الشجرة متاحة بصيغة PDF</p>

    <a class="tree-card" href="https://drive.google.com/file/d/1Fq8AudwxOXrLJuhbxdB3SrNNELw0yjk8/view?usp=drivesdk" target="_blank" rel="noopener noreferrer">
      <div class="tree-icon">🌳</div>
      <div class="tree-title">شجرة العائلة</div>
      <div class="tree-desc">اضغط لفتح ملف الشجرة PDF</div>
    </a>

    <button class="btn" disabled>
      App Store
      <span class="soon">قريبًا</span>
    </button>

    <button class="btn" disabled>
      Google Play
      <span class="soon">قريبًا</span>
    </button>
  </div>

  <script>
    const APP_STORE_URL = ''; // TODO: fill in once app is live on App Store
    const GOOGLE_PLAY_URL = ''; // TODO: fill in once app is live on Google Play

    function detectAndRedirect() {
      const ua = navigator.userAgent || navigator.vendor || window.opera;
      const isIOS = /iPad|iPhone|iPod/.test(ua) && !window.MSStream;
      const isAndroid = /android/i.test(ua);
      if (isIOS && APP_STORE_URL) { window.location.href = APP_STORE_URL; return true; }
      if (isAndroid && GOOGLE_PLAY_URL) { window.location.href = GOOGLE_PLAY_URL; return true; }
      return false;
    }
    window.addEventListener('DOMContentLoaded', detectAndRedirect);
  </script>
</body>
</html>
