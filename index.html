<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <script>
  (function() {
    var APP_STORE_URL = 'https://apps.apple.com/sa/app/%D8%B9%D8%A7%D8%A6%D9%84%D8%A9-%D8%A7%D9%84%D8%AD%D8%AC%D8%A7%D8%AC/id6760150192';
    var GOOGLE_PLAY_URL = 'https://play.google.com/store/apps/details?id=com.alhajjajfamily.app';
    var ua = navigator.userAgent || navigator.vendor || window.opera || '';
    var isIOS = /iPad|iPhone|iPod/.test(ua) && !window.MSStream;
    var isAndroid = /android/i.test(ua);
    if (isIOS) { window.location.replace(APP_STORE_URL); return; }
    if (isAndroid) { window.location.replace(GOOGLE_PLAY_URL); return; }
    // Desktop / other: fall through, show the existing landing page content.
  })();
  </script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>عائلة الحجاج</title>

  <!-- Open Graph — for WhatsApp, iMessage, Facebook, etc. -->
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="عائلة الحجاج">
  <meta property="og:title" content="عائلة الحجاج — شجرة العائلة">
  <meta property="og:description" content="تطبيق خاص لأفراد عائلة الحجاج — شجرة العائلة، صور، أخبار، ومقالات في مكان واحد.">
  <meta property="og:url" content="https://alhajjaj-family.com">
  <meta property="og:image" content="https://alhajjaj-family.com/og-preview.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta property="og:image:alt" content="شعار عائلة الحجاج">
  <meta property="og:locale" content="ar_SA">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="عائلة الحجاج — شجرة العائلة">
  <meta name="twitter:description" content="تطبيق خاص لأفراد عائلة الحجاج — شجرة العائلة، صور، أخبار، ومقالات في مكان واحد.">
  <meta name="twitter:image" content="https://alhajjaj-family.com/og-preview.png">
  <link href="https://fonts.googleapis.com/css2?family=El+Messiri:wght@600;700&family=IBM+Plex+Sans+Arabic:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root{
      --olive: #4A6741;
      --gold: #C9A45A;
      --cream: #FAF7F2;
      --dark: #2C1810;
      --muted: #7A6E64;
      --card: #fff;
      --line: rgba(74, 103, 65, 0.15);
      --disabled: #e3e3e3;
      --disabled-text: #8a8a8a;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: 'IBM Plex Sans Arabic', -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", sans-serif;
      background: var(--cream);
      color: var(--dark);
    }

    .wrap {
      max-width: 420px;
      margin: 0 auto;
      padding: 40px 20px 28px;
      text-align: center;
    }

    h1 {
      margin: 0 0 10px;
      font-family: 'El Messiri', serif;
      font-size: 34px;
      font-weight: 700;
      line-height: 1.2;
      color: var(--olive);
    }

    .sub {
      margin: 0 0 28px;
      color: var(--muted);
      font-size: 18px;
    }

    .tree-card {
      display: block;
      text-decoration: none;
      color: inherit;
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 24px;
      padding: 26px 20px;
      margin-bottom: 18px;
    }

    .tree-icon {
      width: 72px;
      height: 72px;
      margin: 0 auto 14px;
      border-radius: 20px;
      background: rgba(74, 103, 65, 0.12);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 34px;
      color: var(--olive);
    }

    .tree-title {
      font-family: 'El Messiri', serif;
      font-size: 26px;
      font-weight: 700;
      margin-bottom: 6px;
      color: var(--olive);
    }

    .tree-desc {
      font-size: 16px;
      color: var(--muted);
    }

    .btn {
      width: 100%;
      border: 0;
      border-radius: 18px;
      padding: 18px 16px;
      background: var(--disabled);
      color: var(--disabled-text);
      font-size: 18px;
      font-weight: 700;
      margin-top: 12px;
      cursor: not-allowed;
    }

    .soon {
      display: block;
      margin-top: 4px;
      font-size: 13px;
      font-weight: 500;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>عائلة الحجاج</h1>
    <p class="sub">الشجرة متاحة بصيغة PDF</p>

    <a class="tree-card" href="https://drive.google.com/file/d/1Fq8AudwxOXrLJuhbxdB3SrNNELw0yjk8/view?usp=drivesdk" target="_blank" rel="noopener noreferrer">
      <div class="tree-icon">🌳</div>
      <div class="tree-title">شجرة العائلة</div>
      <div class="tree-desc">اضغط لفتح ملف الشجرة PDF</div>
    </a>

    <button class="btn" disabled>
      App Store
      <span class="soon">قريبًا</span>
    </button>

    <button class="btn" disabled>
      Google Play
      <span class="soon">قريبًا</span>
    </button>
  </div>
</body>
</html>
